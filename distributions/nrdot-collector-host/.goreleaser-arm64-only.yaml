version: 2
project_name: nrdot-collector-releases
release:
  draft: true
  disable: true
builds:
  # Oracle-enabled build - CGO enabled for Linux ARM64 only
  - id: nrdot-collector-host
    goos:
      - linux
    goarch:
      - arm64
    dir: distributions/nrdot-collector-host/_build
    binary: nrdot-collector-host
    ldflags:
      - -s
      - -w
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
archives:
  - id: nrdot-collector-host
    builds:
      - nrdot-collector-host
    name_template: 'nrdot-collector-host_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - src: distributions/nrdot-collector-host/config.yaml
        dst: config.yaml
        strip_parent: true
nfpms:
  # Oracle-enabled packages (Linux ARM64 with CGO support)
  - file_name_template: >-
      {{ .PackageName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    package_name: nrdot-collector-host
    contents:
      - src: distributions/nrdot-collector-host/nrdot-collector-host.service
        dst: /lib/systemd/system/nrdot-collector-host.service
      - src: distributions/nrdot-collector-host/nrdot-collector-host.conf
        dst: /etc/nrdot-collector-host/nrdot-collector-host.conf
        type: config|noreplace
      - src: distributions/nrdot-collector-host/config.yaml
        dst: /etc/nrdot-collector-host/config.yaml
        type: config
    scripts:
      preinstall: distributions/nrdot-collector-host/preinstall.sh
      postinstall: distributions/nrdot-collector-host/postinstall.sh
      preremove: distributions/nrdot-collector-host/preremove.sh
    overrides:
      rpm:
        dependencies:
          - /bin/sh
    id: nrdot-collector-host
    builds:
      - nrdot-collector-host
    formats:
      - deb
      - rpm
    maintainer: New Relic <otelcomm-team@newrelic.com>
    description: NRDOT Collector - nrdot-collector-host (with Oracle Instant Client and SQL Server support via CGO)
    license: Apache 2.0
snapshot:
  version_template: '{{ incpatch .Version }}-SNAPSHOT-{{.ShortCommit}}'
checksum:
  name_template: '{{ .ArtifactName }}.sum'
  algorithm: sha256
  split: true
changelog:
  disable: true
