# Replace with custom sqlserver receiver from spathlavath fork (commit 797f7aff3ca09a55c1dbd1b8e6505e33d6d6d2c5)
  - github.com/open-telemetry/opentelemetry-collector-contrib/receiver/newrelicsqlserverreceiver => github.com/spathlavath/opentelemetry-collector-contrib/receiver/newrelicsqlserverreceiver 797f7aff3ca09a55c1dbd1b8e6505e33d6d6d2c5

